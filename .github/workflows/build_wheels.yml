name: Build

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 is intel, macos-14 is apple silicon, windows-11-arm
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-14]

    steps:
      - uses: actions/checkout@v6

      - name: Set-up on MacOS
        if: ${{ matrix.os == 'macos-14' }}
        run: |
          brew install libomp

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==4.1.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS: auto64  # Don't build 32 bits wheels
          CIBW_SKIP: pp*  # Don't build pypy wheels
          CIBW_ENVIRONMENT: "ITZI_BDIST_WHEEL=1 NO_STABLE_ABI=1"  # Trigger generic compiler flags
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=14.0
            ITZI_BDIST_WHEEL=1
            NO_STABLE_ABI=1
          CIBW_BEFORE_TEST: "pip install pytest pytest-benchmark pandas scipy"
          CIBW_TEST_SOURCES: tests
          CIBW_TEST_COMMAND: >  # Fast tests
            pytest -m "not slow and not cloud" tests/

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-sdist
          path: dist/*.tar.gz
