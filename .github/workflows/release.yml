name: Release

on:
  push:
    tags:
      - "v*"

# Publishing permissions are granted only to the jobs that need them.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - name: Reject releases outside the canonical repository
        if: github.repository != 'ItziModel/itzi-core'
        run: |
          echo "Releases may only run from ItziModel/itzi-core." >&2
          exit 1

      - uses: actions/checkout@v6

      - name: Verify the tag and package version
        run: python scripts/release_checks.py verify-version "$GITHUB_REF_NAME"

  test:
    name: Test release
    needs: verify-version
    uses: ./.github/workflows/tests.yml

  build:
    name: Build release artifacts
    needs: verify-version
    uses: ./.github/workflows/build_wheels.yml

  validate-artifacts:
    name: Validate release artifacts
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          pattern: cibw-*
          merge-multiple: true
          path: dist

      - name: Verify artifact versions and coverage
        run: python scripts/release_checks.py verify-artifacts dist "$GITHUB_REF_NAME"

      - name: Check distribution metadata
        run: |
          python -m pip install --disable-pip-version-check twine
          python -m twine check dist/*

      - name: Install the source distribution
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libomp-dev
          python -m venv sdist-venv
          sdist-venv/bin/python -m pip install --upgrade pip
          sdist-venv/bin/python -m pip install --no-cache-dir dist/*.tar.gz
          sdist-venv/bin/python -c "import itzi_core"

  publish-pypi:
    name: Publish to PyPI
    needs: validate-artifacts
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: cibw-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  create-github-release:
    name: Create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: cibw-*
          merge-multiple: true
          path: dist

      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TAG" \
            --generate-notes
