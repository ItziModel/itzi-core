name: tests

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    runs-on: ubuntu-latest
    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ca-certificates clang build-essential libomp-dev nodejs

    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Install uv and Python
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        $HOME/.local/bin/uv python install ${{ matrix.python-version }}

    - name: Pytest
      run: |
        $HOME/.local/bin/uv run --all-extras --python ${{ matrix.python-version }} pytest --cov=src --junitxml=junit/test-core-results.xml --cov-report=xml --cov-report=html tests/

    - name: Upload coverage
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
